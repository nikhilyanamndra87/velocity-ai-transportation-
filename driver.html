<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Velocity Driver Terminal</title>
    <style>
        body { background: #000; color: #fff; font-family: sans-serif; text-align: center; padding: 40px; }
        .btn { background: #276ef1; color: #fff; padding: 20px; border-radius: 12px; font-size: 20px; border: none; width: 100%; margin-bottom: 20px; font-weight: bold;}
        .sos { background: #ff4b4b; box-shadow: 0 0 20px rgba(255,75,75,0.4); }
        #status { color: #888; margin-bottom: 20px; font-family: monospace; }
    </style>
</head>
<body>
    <h1>🚖 Velocity Driver</h1>
    <div id="status">Status: OFFLINE</div>
    
    <button class="btn" onclick="goLive()">GO ONLINE</button>
    <button class="btn sos" id="sosBtn" onclick="toggleSOS()">TRIGGER SOS</button>

    <script>
        // TARGETING YOUR SPECIFIC DATABASE
        const DB_URL = "https://velocity-ai-b3d5d-default-rtdb.firebaseio.com/drivers/Nikhil_Driver.json";
        let sosActive = false;

        function toggleSOS() {
            sosActive = !sosActive;
            const btn = document.getElementById('sosBtn');
            btn.style.background = sosActive ? "#fff" : "#ff4b4b";
            btn.style.color = sosActive ? "#ff4b4b" : "#fff";
            btn.innerText = sosActive ? "SOS ACTIVE" : "TRIGGER SOS";
        }

        function goLive() {
            document.getElementById('status').innerText = "Status: LIVE TRANSMITTING";
            
            // WatchPosition gets REAL hardware GPS updates
            navigator.geolocation.watchPosition((pos) => {
                const data = {
                    lat: pos.coords.latitude,
                    lon: pos.coords.longitude,
                    sos: sosActive,
                    timestamp: Date.now()
                };

                fetch(DB_URL, {
                    method: 'PUT',
                    body: JSON.stringify(data)
                });
                
                document.getElementById('status').innerText = `LIVE: ${data.lat.toFixed(4)}, ${data.lon.toFixed(4)}`;
            }, (err) => {
                alert("GPS Error: Please enable Location Permissions");
            }, {
                enableHighAccuracy: true,
                maximumAge: 0
            });
        }
    </script>
</body>
</html>
